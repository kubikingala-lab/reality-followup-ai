# fly.toml app configuration file generated for reality-crm-cz on 2026-07-14T13:30:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "reality-crm-cz"
primary_region = "ams"

[build]
  image = "node:20-alpine"

[build.args]
  NODE_ENV = "production"

[env]
  NODE_ENV = "production"
  DATABASE_URL = "postgresql://postgres:postgres@localhost/reality_followup"
  VITE_APP_ID = "manus-app-id"
  OAUTH_SERVER_URL = "https://api.manus.im"
  VITE_OAUTH_PORTAL_URL = "https://portal.manus.im"
  LICENSE_SECRET = "change-me-to-random-secret"
  JWT_SECRET = "change-me-to-random-secret"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 3000

  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 500

  [[services.ports]]
    number = 80
    protocol = "tcp"
    handlers = ["http"]

  [[services.ports]]
    number = 443
    protocol = "tcp"
    handlers = ["tls", "http"]

  [services.http_checks]
    enabled = true
    interval = "10s"
    timeout = "5s"
    grace_period = "5s"
    method = "get"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[deploy]
  release_command = "node dist/server/index.js"
